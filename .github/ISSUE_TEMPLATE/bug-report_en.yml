name: 🐞 Bug Report (English)
description: Report a bug
title: "[Bug] "
labels: ["bug"]

body:

  - type: input
    id: version
    attributes:
      label: Version
      description: Commit ID (hash). If unknown, write "latest as of YYYY-MM-DD"
      placeholder: "Example: a1b2c3d"
    validations:
      required: true

  - type: input
    id: area
    attributes:
      label: Area (Where is the bug?)
      description: highlight / install / config etc.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: plugins
    attributes:
      label: Related Plugins

  - type: textarea
    id: os
    attributes:
      label: OS Information
      placeholder: |
        OS:
        Neovim:
        Other:

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes (optional)
